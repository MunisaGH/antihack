services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: career-ai-backend:latest
    container_name: career-ai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - /var/lib/career-ai/staticfiles:/app/staticfiles
      - /var/lib/career-ai/media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/public/stats/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
