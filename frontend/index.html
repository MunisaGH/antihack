<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <meta name="description" content="CAREER AI — AI bilan aqlli va tez ishga qabul qilish platformasi." />
    <meta property="og:title" content="CAREER AI — AI-powered recruitment" />
    <meta property="og:description" content="Rezyumelarni avtomatik tahlil qiling, adaptiv chat intervyular o'tkazing, eng yaxshi nomzodlarni toping." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hiring.career-ai.uz" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <script>
      // FOUC oldini olish uchun — React render bo'lishidan oldin theme ni qo'llash.
      (function () {
        try {
          var stored = localStorage.getItem('career_ai.theme');
          var theme = 'system';
          if (stored) {
            var parsed = JSON.parse(stored);
            theme = (parsed && parsed.state && parsed.state.theme) || 'system';
          }
          var isDark = theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (_) {}
      })();
    </script>

    <title>CAREER AI</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
