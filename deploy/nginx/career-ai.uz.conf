# /etc/nginx/sites-available/career-ai.uz
# Birinchi o'rnatishda HTTP-only (port 80).
# Certbot --nginx bu faylga SSL qatorlarini avtomatik qo'shadi,
# va 443 server blokini yaratadi. U keyin bu faylni o'zi boshqaradi.
# Keyinchalik deploy.sh bu faylga tegmaydi (faqat --nginx-update flag bilan).

upstream career_ai_backend {
    server 127.0.0.1:8010;
    keepalive 16;
}

# Rate limits
limit_req_zone $binary_remote_addr zone=career_ai_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=career_ai_login:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name career-ai.uz;

    # Xavfsizlik header'lari
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Yuklash hajmi
    client_max_body_size 15M;
    client_body_buffer_size 128k;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript
               application/json application/xml application/rss+xml image/svg+xml;

    # ---- Frontend static (SPA) ----
    root /var/www/career-ai.uz;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Backend API ----
    location /api/ {
        limit_req zone=career_ai_api burst=50 nodelay;
        proxy_pass http://career_ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /api/auth/login/ {
        limit_req zone=career_ai_login burst=10 nodelay;
        proxy_pass http://career_ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Interview SSE streaming
    location ~ ^/api/(interview|public/interview) {
        proxy_pass http://career_ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://career_ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static
    location /static/ {
        alias /var/lib/career-ai/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Media
    location /media/ {
        alias /var/lib/career-ai/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Hidden files block
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SPA fallback — hamma noma'lum URL index.html ga
    location / {
        try_files $uri $uri/ /index.html;
    }
}
