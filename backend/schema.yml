openapi: 3.0.3
info:
  title: AI Recruiting Platform API
  version: 1.0.0
  description: "\n    # AI Recruiting Platform API\n    \n    Bu platforma ish beruvchilar\
    \ va ish qidiruvchilar o'rtasida AI yordamida vakansiyalar va arizalarni boshqarish\
    \ uchun yaratilgan.\n    \n    ## Asosiy funksiyalar:\n    - **Authentication**:\
    \ JWT token orqali autentifikatsiya\n    - **Profile Management**: User profil\
    \ boshqaruvi\n    - **Vacancy Management**: Vakansiyalar boshqaruvi\n    - **Application\
    \ Management**: Arizalar boshqaruvi\n    - **AI Analysis**: AI yordamida resume\
    \ va interview tahlili\n    - **Notifications**: Bildirishnomalar\n    - **Analytics**:\
    \ Statistikalar va hisobotlar\n    \n    ## Autentifikatsiya:\n    Barcha endpointlar\
    \ (public endpointlar bundan mustasno) JWT token talab qiladi.\n    Token olish\
    \ uchun `/api/auth/login/` endpointidan foydalaning.\n    \n    ## Public Endpoints:\n\
    \    - `/api/public/vacancies/` - Vakansiyalar ro'yxati\n    - `/api/public/vacancy/{unique_link}/`\
    \ - Vakansiya ma'lumotlari\n    - `/api/public/stats/` - Platform statistikasi\n\
    \    - `/api/public/submit_application/` - Ariza yuborish\n    "
